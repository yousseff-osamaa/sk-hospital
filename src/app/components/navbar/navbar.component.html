    <div class="nav-actions" style="display: flex; align-items: center; gap: 1.2rem;">
      
      <a href="tel:16111" class="btn-emergency">
        <i data-lucide="phone-call"></i> 16111
      </a>

      
      <ng-container *ngIf="!isLoggedIn && !isAdmin">
        
        <a routerLink="/login" class="btn-login-link">Login</a>
      </ng-container>

      <ng-container *ngIf="isPatient && !isAdmin">
        <div class="user-pill">
          <span class="user-name">
            <i data-lucide="user"></i> {{ currentUser?.name?.split(' ')[0] }}
          </span>
          <button (click)="logout()" class="btn-logout-small">
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </ng-container>

      <ng-container *ngIf="isAdmin">
        <div class="admin-pill" style="display: flex; align-items: center; gap: 0.8rem;">
          <span style="color: #f59e0b; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 4px;">
            <i data-lucide="shield-check" style="width: 16px;"></i> ADMIN
          </span>
          <a routerLink="/admin" class="btn-admin-dash">Dashboard</a>
          <button (click)="logout()" class="btn-logout-small"><i data-lucide="log-out"></i></button>
        </div>
      </ng-container>

    </div>

    <button class="mobile-menu-btn" (click)="isMenuOpen = !isMenuOpen">
      <i [attr.data-lucide]="isMenuOpen ? 'x' : 'menu'"></i>
