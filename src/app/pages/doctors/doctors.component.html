
<section class="dr-listing section-padding">
    <div class="container">
        <div class="dr-grid">
            <div class="dr-card glass" *ngFor="let dr of doctors">
                <div class="dr-avatar">
                    <div class="dr-img-container" *ngIf="dr.image">
                        <img [src]="dr.image" [alt]="dr.name" class="dr-img">
                    </div>
                </div>
                <div class="dr-details">
                    <span class="spec">{{dr.specialty}}</span>
                    <h4>{{dr.name}}</h4>
                    <p class="bio">{{dr.bio}}</p>
                    <div class="dr-actions">
                        <div class="dr-schedule" style="margin-bottom: 1.25rem; font-weight: 600; color: #00a76f;">
                            <i data-lucide="clock" style="width: 16px; height: 16px; margin-right: 5px;"></i> المواعيد: {{dr.schedule}}
                        </div>
                        <button class="btn btn-primary btn-sm" [routerLink]="['/appointment']" [queryParams]="{doctor: dr.name}">Book Now (احجز الان)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<div class="container my-5" style="direction: rtl;">
    <div class="text-center mb-5">
        <h2 style="color: #1c306e; font-weight: 800; border-bottom: 3px solid #00a76f; display: inline-block; padding-bottom: 10px;">
            جداول مواعيد العيادات
        </h2>
    </div>

    <div class="row">
        <div class="col-12 mb-5" *ngFor="let table of scheduleTables">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                <div class="card-header border-0 p-3" style="background: #1c306e; color: white;">
                    <h5 class="m-0 text-center fw-bold">{{ table.title }}</h5>
                </div>
                
                <div class="card-body p-0" style="overflow-x: auto;">
                    <div style="padding: 10px;"> 
                        <a [href]="table.image" target="_blank">
                            <img [src]="table.image" 
                                 style="width: 100%; height: auto; display: block; border-radius: 8px; min-width: 500px;" 
                                 [alt]="table.title">
                        </a>
                    </div>
                </div>
                </div>
        </div>
    </div>
</div>
